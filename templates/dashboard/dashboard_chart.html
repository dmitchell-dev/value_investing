{% extends '_base.html' %}

{% block title %}Charts — {{ company.company_name }}{% endblock title %}

{% block content %}
<div class="page-header">
  <h1><i class="fas fa-chart-bar me-2" style="color: var(--accent-blue);"></i>Charts</h1>
</div>

<div class="row g-3">
  <div class="col-12">
    <div class="card">
      <div class="card-header">Intrinsic Value</div>
      <div class="card-body p-2">
        <div id="intrinsicValueDiv" class="responsive-plot"></div>
      </div>
    </div>
  </div>
  <div class="col-12">
    <div class="card">
      <div class="card-header">Share Price</div>
      <div class="card-body p-2">
        <div id="sharePriceDiv" class="responsive-plot"></div>
      </div>
    </div>
  </div>
  <div class="col-12">
    <div class="card">
      <div class="card-header">Dividends</div>
      <div class="card-body p-2">
        <div id="dividendDiv" class="responsive-plot"></div>
      </div>
    </div>
  </div>
  <div class="col-12">
    <div class="card">
      <div class="card-header">Return on Equity</div>
      <div class="card-body p-2">
        <div id="roeDiv" class="responsive-plot"></div>
      </div>
    </div>
  </div>
  <div class="col-12">
    <div class="card">
      <div class="card-header">Earnings Per Share</div>
      <div class="card-body p-2">
        <div id="epsDiv" class="responsive-plot"></div>
      </div>
    </div>
  </div>
  <div class="col-12">
    <div class="card">
      <div class="card-header">Return on Capital Employed</div>
      <div class="card-body p-2">
        <div id="roceDiv" class="responsive-plot"></div>
      </div>
    </div>
  </div>
  <div class="col-12">
    <div class="card">
      <div class="card-header">Equity per Share</div>
      <div class="card-body p-2">
        <div id="equityDiv" class="responsive-plot"></div>
      </div>
    </div>
  </div>
  <div class="col-12">
    <div class="card">
      <div class="card-header">Total Multi</div>
      <div class="card-body p-2">
        <div id="totalDiv" class="responsive-plot"></div>
      </div>
    </div>
  </div>
  <div class="col-12">
    <div class="card">
      <div class="card-header">Current Multi</div>
      <div class="card-body p-2">
        <div id="currentDiv" class="responsive-plot"></div>
      </div>
    </div>
  </div>
</div>
{% endblock content %}

<script>
{% block jquery %}

    var darkLayout = {
        plot_bgcolor: "#161b22",
        paper_bgcolor: "#161b22",
        font: { color: '#e6edf3' },
        xaxis: { gridcolor: "#30363d", color: '#8b949e' },
        yaxis: { gridcolor: "#30363d", color: '#8b949e' },
        legend: {
            font: { color: '#e6edf3' },
            bgcolor: '#21262d'
        }
    };

    var index = ["share-price/", "dividend/", "roe/", "eps/", "roce/", "equity-share/"];
    var div_index = ["sharePriceDiv", "dividendDiv", "roeDiv", "epsDiv", "roceDiv", "equityDiv"];
    var index_size = index.length;

    var f = (function(){
    var xhr = [], i;
    for(i = 0; i < index_size; i++){
        (function(i){
            var url = "data/" + index[i];
            var div_id = div_index[i];

            xhr[i] = new XMLHttpRequest();
            xhr[i].open("GET", url, true);
            xhr[i].onreadystatechange = function(){
                if (xhr[i].readyState === 4 && xhr[i].status === 200){
                    var data = JSON.parse(xhr[i].responseText.replace(/\bNaN\b/g, "null"));
                    var trace1 = {
                        x: data.x_data,
                        y: data.y_data,
                        type: 'scatter',
                        line: { color: '#58a6ff' }
                    };
                    var layout = Object.assign({}, darkLayout, {
                        title: { text: data.param_name, font: { color: '#e6edf3' } }
                    });
                    Plotly.newPlot(div_id, [trace1], layout);
                }
            };
            xhr[i].send();
        })(i);
    }
    })();

    var index2 = ["total-multi/", "current-multi/", "intrinsic-multi/"];
    var div_index2 = ["totalDiv", "currentDiv", "intrinsicValueDiv"];
    var index_size2 = index2.length;

    var f2 = (function(){
    var xhr2 = [], i;
    for(i = 0; i < index_size2; i++){
        (function(i){
            var url = "data/" + index2[i];
            var div_id = div_index2[i];

            xhr2[i] = new XMLHttpRequest();
            xhr2[i].open("GET", url, true);
            xhr2[i].onreadystatechange = function(){
                if (xhr2[i].readyState === 4 && xhr2[i].status === 200){
                    var data = JSON.parse(xhr2[i].responseText.replace(/\bNaN\b/g, "null"));
                    var trace1 = { x: data.df1_x_data, y: data.df1_y_data, type: 'scatter', name: data.df1_name, line: { color: '#58a6ff' } };
                    var trace2 = { x: data.df2_x_data, y: data.df2_y_data, type: 'scatter', name: data.df2_name, line: { color: '#3fb950' } };
                    var trace3 = { x: data.df3_x_data, y: data.df3_y_data, type: 'scatter', name: data.df3_name, line: { color: '#f85149' } };
                    var layout = Object.assign({}, darkLayout, {
                        title: { text: data.chart_title, font: { color: '#e6edf3' } },
                        showlegend: true
                    });
                    Plotly.newPlot(div_id, [trace1, trace2, trace3], layout);
                }
            };
            xhr2[i].send();
        })(i);
    }
    })();

    (function() {
    var d3 = Plotly.d3;
    var gd3 = d3.selectAll(".responsive-plot")
        .style({
            width: '100%',
            'margin-left': (100 - 100) / 2 + '%',
            height: '500px',
            'margin-top': (100 - 90) / 2 + 'vh'
        });
    var nodes_to_resize = gd3[0];
    window.onresize = function() {
        for (var i = 0; i < nodes_to_resize.length; i++) {
            Plotly.Plots.resize(nodes_to_resize[i]);
        }
    };
    })();

{% endblock jquery %}
</script>
