{% extends '_base.html' %}
{% load crispy_forms_tags %}

{% block title %}Edit Transaction{% endblock title %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">

    <div class="page-header">
      <h1><i class="fas fa-wrench me-2" style="color: var(--accent-yellow);"></i>Edit Transaction</h1>
      <p>Update the details of this transaction.</p>
    </div>

    <div class="card">
      <div class="card-header">
        <i class="fas fa-exchange-alt me-2"></i>Transaction Details
      </div>
      <div class="card-body p-4">
        <form action="" method="post">
          {% csrf_token %}
          {{ form|crispy }}
          <div class="d-flex gap-2 mt-3">
            <button type="submit" class="btn btn-success">
              <i class="fas fa-save me-1"></i> Save Changes
            </button>
            <a href="{% url 'portfolio:transaction_list' %}" class="btn btn-secondary">
              <i class="fas fa-arrow-left me-1"></i> Cancel
            </a>
          </div>
        </form>
      </div>
    </div>

  </div>
</div>
{% endblock content %}
